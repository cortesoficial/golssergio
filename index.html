<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALEX — Seletor de Oportunidades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0b0f12] text-slate-200 min-h-screen p-6">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-black text-[#2ecc71] mb-2">ALEX <span class="text-slate-500 font-light">| SELETOR DE VALOR</span></h1>
        
        <section class="bg-[#161d24] p-6 rounded-2xl border border-slate-800 mb-8">
            <div class="flex flex-wrap gap-4 items-end">
                <div class="flex-1 min-w-[200px]">
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Margem de Segurança (Probabilidade)</label>
                    <input type="range" id="filtro-prob" min="40" max="80" value="55" class="w-full accent-[#2ecc71] mt-2" oninput="val.innerText = this.value">
                    <div class="text-right text-xs font-bold text-[#2ecc71]"><span id="val">55</span>% de confiança mínima</div>
                </div>
                <button onclick="analisarOportunidades()" class="bg-[#2ecc71] hover:bg-[#27ae60] text-white px-8 py-3 rounded-lg font-bold transition-all">
                    SELECIONAR MELHORES
                </button>
            </div>
        </section>

        <div id="grid-oportunidades" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <p class="text-slate-600 italic">O robô está pronto. Clique em "Selecionar Melhores" para iniciar a análise analítica.</p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        async function analisarOportunidades() {
            const grid = document.getElementById("grid-oportunidades");
            const confiancaMin = parseInt(document.getElementById("filtro-prob").value);
            
            grid.innerHTML = `<p class="text-[#2ecc71] animate-pulse">Analisando grade de jogos... aplicando filtros de valor...</p>`;

            try {
                const url = `https://corsproxy.io/?https://api.the-odds-api.com/v4/sports/soccer/odds/?apiKey=17ff5de216b7d5283de72a97f0ebb49c&regions=eu&markets=h2h&oddsFormat=decimal`;
                const res = await fetch(url);
                const jogos = await res.json();

                grid.innerHTML = "";
                let selecionados = 0;

                jogos.forEach(jogo => {
                    // Lógica de Seleção: O robô foca apenas em jogos onde a odd entrega valor
                    jogo.bookmakers[0].markets[0].outcomes.forEach(o => {
                        const prob = Math.round(100 / o.price);
                        
                        // O "Filtro do Robô": Seleciona odds que não são muito óbvias (acima de 1.5) 
                        // e que respeitam a margem de segurança que você definiu
                        if (o.price >= 1.50 && o.price <= 2.20 && prob >= confiancaMin) {
                            selecionados++;
                            
                            const card = document.createElement("div");
                            card.className = "bg-[#1e272e] p-5 rounded-xl border-l-4 border-[#2ecc71] shadow-lg";
                            card.innerHTML = `
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400 font-bold">${jogo.sport_title}</span>
                                    <span class="text-[#2ecc71] font-black text-xl">${o.price}</span>
                                </div>
                                <h3 class="font-bold text-sm mb-1">${jogo.home_team.split('(')[0]} vs ${jogo.away_team.split('(')[0]}</h3>
                                <p class="text-[11px] text-slate-400 mb-4">Palpite sugerido: <strong>${o.name}</strong></p>
                                <div class="flex items-center gap-2">
                                    <div class="bg-slate-700 w-full h-1.5 rounded-full overflow-hidden">
                                        <div class="bg-[#2ecc71] h-full" style="width:${prob}%"></div>
                                    </div>
                                    <span class="text-[10px] font-bold whitespace-nowrap">${prob}% Confiança</span>
                                </div>
                            `;
                            grid.appendChild(card);
                        }
                    });
                });

                if (selecionados === 0) grid.innerHTML = `<p class="text-red-400">Nenhum jogo atende aos critérios de valor no momento.</p>`;
            } catch (e) {
                grid.innerHTML = `<p class="text-red-500">Erro na análise. Tente novamente.</p>`;
            }
        }
    </script>
</body>
</html>
