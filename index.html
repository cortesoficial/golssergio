<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALEX PRO | Conectado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="text-slate-200 h-screen flex flex-col overflow-hidden">

    <header class="bg-[#0f172a] border-b border-slate-800 px-6 py-4 flex justify-between items-center z-20 shrink-0">
        <div class="flex items-center gap-2.5">
            <div class="w-9 h-9 bg-purple-500/10 rounded-lg flex items-center justify-center border border-purple-500/20">
                <i data-lucide="cpu" class="text-purple-400 w-5 h-5"></i>
            </div>
            <h1 class="text-lg font-black tracking-widest text-slate-100">ALEX <span class="text-emerald-500">PRO</span></h1>
        </div>
        <div id="status-indicator" class="w-3 h-3 rounded-full bg-slate-600 animate-pulse"></div>
    </header>

    <div class="flex flex-1 flex-col md:flex-row overflow-hidden">
        <aside class="w-full md:w-80 bg-[#1e293b] border-b md:border-r border-slate-800 p-6">
            <button id="btn-toggle" onclick="toggleRadar()" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-black py-4 rounded-xl transition-all flex items-center justify-center gap-2 text-sm active:scale-95">
                <i data-lucide="zap" class="w-4 h-4"></i>
                <span id="btn-text">INICIAR MOTOR IA</span>
            </button>
        </aside>

        <main class="flex-1 bg-slate-900 p-8 overflow-y-auto">
            <div id="status-banner" class="bg-amber-500/10 border border-amber-500/30 text-amber-500 px-4 py-3 rounded-xl mb-6 flex items-center justify-center gap-2 font-bold text-xs uppercase tracking-widest shadow-lg animate-pulse">
                <i data-lucide="alert-triangle" class="w-4 h-4"></i>
                <span>Sistema Inativo por enquanto</span>
            </div>

            <div id="grid-alertas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        let isRunning = false;
        const API_KEY = '59ab96fa9795389a920737c329ab262b';

        async function toggleRadar() {
            isRunning = !isRunning;
            const btnToggle = document.getElementById('btn-toggle');
            const btnText = document.getElementById('btn-text');
            const statusBanner = document.getElementById('status-banner');
            const statusIndicator = document.getElementById('status-indicator');

            if (isRunning) {
                btnToggle.classList.replace('bg-purple-600', 'bg-red-600');
                btnText.innerText = "DESLIGAR MOTOR";
                statusBanner.classList.add('hidden');
                statusIndicator.classList.replace('bg-slate-600', 'bg-emerald-500');
                
                await executarVarredura();
            } else {
                btnToggle.classList.replace('bg-red-600', 'bg-purple-600');
                btnText.innerText = "INICIAR MOTOR IA";
                statusBanner.classList.remove('hidden');
                statusIndicator.classList.replace('bg-emerald-500', 'bg-slate-600');
                document.getElementById('grid-alertas').innerHTML = '';
            }
        }

        async function executarVarredura() {
            const grid = document.getElementById('grid-alertas');
            grid.innerHTML = '<p class="text-slate-400 text-sm italic">Processando dados via API-Football...</p>';

            const options = {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': API_KEY,
                    'x-rapidapi-host': 'api-football-v1.p.rapidapi.com'
                }
            };

            try {
                // Busca jogos de hoje (30/05/2026)
                const response = await fetch('https://api-football-v1.p.rapidapi.com/v3/fixtures?date=2026-05-30', options);
                const data = await response.json();

                if (data.response && data.response.length > 0) {
                    grid.innerHTML = ''; // Limpa o "processando"
                    data.response.slice(0, 6).forEach(match => {
                        renderCard(match);
                    });
                } else {
                    grid.innerHTML = '<p class="text-red-400 text-sm">Nenhum jogo encontrado para hoje ou limite de API atingido.</p>';
                }
            } catch (error) {
                grid.innerHTML = '<p class="text-red-400 text-sm">Erro ao conectar com API. Verifique sua chave.</p>';
                console.error(error);
            }
        }

        function renderCard(match) {
            const grid = document.getElementById('grid-alertas');
            const card = document.createElement('div');
            card.className = "glass-panel p-5 rounded-2xl border border-slate-700";
            card.innerHTML = `
                <h3 class="text-sm font-bold text-slate-100 mb-2">${match.teams.home.name} vs ${match.teams.away.name}</h3>
                <p class="text-xs text-slate-400 mb-4">${match.league.name}</p>
                <a href="https://br.betano.com/sport/futebol/" target="_blank" class="block w-full text-center bg-[#e85a00] hover:bg-[#ff6c12] text-white font-black text-xs py-2 rounded-lg transition-all">
                    APOSTAR NA BETANO
                </a>
            `;
            grid.appendChild(card);
        }
    </script>
</body>
</html>
