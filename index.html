<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner de Futebol Pro - Live</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.5rem;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 10px;
            margin-top: 30px;
            margin-bottom: 15px;
        }

        /* Grid de Alertas */
        #alerts-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.75rem;
            margin-bottom: 10px;
        }

        .badge-over { background: #d1fae5; color: #065f46; }
        .badge-cantos { background: #fef3c7; color: #92400e; }
        .badge-virada { background: #fee2e2; color: #991b1b; }

        .card-title {
            font-size: 1.25rem;
            font-weight: bold;
            margin: 5px 0;
        }

        .card-desc {
            color: var(--text-muted);
            margin: 0;
        }

        /* Tabela de Jogos */
        .table-wrapper {
            overflow-x: auto;
            background-color: var(--card-bg);
            border-radius: 8px;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #334155;
        }

        th {
            background-color: #1e293b;
            color: var(--primary);
            font-weight: bold;
        }

        tr:hover {
            background-color: #24334d;
        }

        .status-msg {
            color: var(--text-muted);
            font-style: italic;
            text-align: center;
            padding: 20px;
        }

        .btn-refresh {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            display: block;
            margin: 0 auto 20px auto;
        }

        .btn-refresh:hover { background-color: #2563eb; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚽ Scanner de Oportunidades - Live Betting</h1>
    
    <button class="btn-refresh" onclick="fetchLiveMatches()">🔄 Atualizar Scanner</button>

    <div class="section-title">🚨 Alertas Urgentes Detectados</div>
    <div id="alerts-container">
        <div class="status-msg">Carregando partidas ao vivo...</div>
    </div>

    <div class="section-title">📊 Todos os Jogos em Tempo Real</div>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Partida</th>
                    <th>Minuto</th>
                    <th>Placar</th>
                    <th>Total Gols</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="4" class="status-msg">Nenhum dado carregado.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const API_KEY = "17ff5de216b7d5283de72a97f0ebb49c";
    const PROXY_URL = "https://cors-anywhere.herokuapp.com/"; // Proxy para evitar bloqueio de CORS no navegador
    const API_URL = "https://v3.football.api-sports.io/fixtures?live=all";

    async function fetchLiveMatches() {
        const alertsContainer = document.getElementById('alerts-container');
        const tableBody = document.getElementById('table-body');
        
        alertsContainer.innerHTML = '<div class="status-msg">Buscando dados na API-Football...</div>';
        
        try {
            // Nota: Se der erro de CORS no navegador local, use o endpoint direto se colocar no GitHub Pages
            const response = await fetch(API_URL, {
                method: "GET",
                headers: {
                    "x-apisports-key": API_KEY,
                    "x-rapidapi-host": "v3.football.api-sports.io"
                }
            });

            const data = await response.json();
            const matches = data.response || [];

            alertsContainer.innerHTML = '';
            tableBody.innerHTML = '';

            if (matches.length === 0) {
                alertsContainer.innerHTML = '<div class="status-msg">Nenhuma partida ao vivo acontecendo agora.</div>';
                tableBody.innerHTML = '<tr><td colspan="4" class="status-msg">Sem jogos ativos.</td></tr>';
                return;
            }

            let alertasCriados = 0;

            matches.forEach(item => {
                const tempo = item.fixture.status.elapsed || 0;
                const home = item.teams.home.name;
                const away = item.teams.away.name;
                const gHome = item.goals.home !== null ? item.goals.home : 0;
                const gAway = item.goals.away !== null ? item.goals.away : 0;
                const totalGols = gHome + gAway;

                // 1. Alimentar a Tabela Geral
                const row = `<tr>
                    <td><b>${home}</b> vs <b>${away}</b></td>
                    <td><span style="color: #f59e0b">${tempo}'</span></td>
                    <td>${gHome} x ${gAway}</td>
                    <td>${totalGols}</td>
                </tr>`;
                tableBody.innerHTML += row;

                // 2. Regras Estatísticas para gerar Alertas Visuais
                
                // Filtro Cantos Limite (Minutos 38-45 ou 82-90 com placar empatado ou diferença de 1 gol)
                if (((tempo >= 38 && tempo <= 45) || (tempo >= 82 && tempo <= 90)) && Math.abs(gHome - gAway) <= 1) {
                    createAlertCard('badge-cantos', '🚩 CANTO LIMITE', `${home} vs ${away}`, `Jogo truncado e na reta final do tempo (${tempo}'). Forte tendência de abafar e gerar escanteios finais. Placar: ${gHome}x${gAway}.`, '#f59e0b');
                    alertasCriados++;
                }

                // Filtro Over 1.5 (Segundo tempo inicial com no máximo 1 gol no jogo)
                if ((tempo > 45 && tempo <= 65) && totalGols <= 1) {
                    createAlertCard('badge-over', '⚽ TENDÊNCIA OVER 1.5', `${home} vs ${away}`, `Segundo tempo iniciado com placar baixo (${gHome}x${gAway}). Ideal para acompanhar e buscar o mercado de +1.5 gols devido à necessidade de vitória.`, '#10b981');
                    alertasCriados++;
                }

                // Filtro de Virada / Empate do mandante
                if (tempo > 40 && gHome < gAway) {
                    createAlertCard('badge-virada', '🔄 POSSÍVEL VIRADA / EMPATE', `${home} pressionando ${away}`, `O time da casa está perdendo de ${gHome}x${gAway} aos ${tempo}' minutos. Ótimo cenário para monitorar a reação.`, '#ef4444');
                    alertasCriados++;
                }
            });

            if (alertasCriados === 0) {
                alertsContainer.innerHTML = '<div class="status-msg">Nenhum sinal crítico gerado pelos filtros neste minuto.</div>';
            }

        } catch (error) {
            alertsContainer.innerHTML = `<div class="status-msg" style="color: #ef4444">Erro ao conectar com a API: ${error.message}</div>`;
        }
    }

    function createAlertCard(badgeClass, badgeText, title, desc, borderColor) {
        const container = document.getElementById('alerts-container');
        const card = `
            <div class="card" style="border-left-color: ${borderColor}">
                <span class="badge ${badgeClass}">${badgeText}</span>
                <div class="card-title">${title}</div>
                <p class="card-desc">${desc}</p>
            </div>
        `;
        container.innerHTML += card;
    }

    // Executa assim que abre a página
    window.onload = fetchLiveMatches;
</script>

</body>
</html>
