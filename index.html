<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipAI - Gerador de Shorts Automático</title>
    <style>
        :root {
            --primary: #ff0050;
            --secondary: #00f2fe;
            --background: #0f0f13;
            --card-bg: #1e1e26;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #aaa;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #333;
            background: #111;
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            outline: none;
        }

        button {
            background: linear-gradient(45deg, var(--primary), #d00043);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 0, 80, 0.4);
        }

        /* Loading Animation */
        .loading {
            display: none;
            margin: 20px auto;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Resultado */
        .result-section {
            display: none;
            margin-top: 30px;
            border-top: 1px solid #333;
            padding-top: 30px;
        }

        .video-preview {
            width: 250px;
            height: 444px; /* Proporção 9:16 */
            background: #000;
            margin: 0 auto 20px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-download {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
        }
        .btn-download:hover {
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ClipAI</h1>
        <p>Cole o link do YouTube e nossa IA criará Shorts de 30 segundos das melhores partes.</p>

        <div class="input-group">
            <input type="text" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=...">
            <button id="btnGerar" onclick="gerarShort()">Gerar Vídeo Curto</button>
        </div>

        <!-- Área de Carregamento -->
        <div class="loading" id="loadingArea">
            <div class="spinner"></div>
            <p id="loadingText">Baixando vídeo e analisando melhores momentos...</p>
        </div>

        <!-- Área do Resultado -->
        <div class="result-section" id="resultArea">
            <h3>✨ Seu Short está pronto!</h3>
            <p style="margin-bottom: 15px;">Formato 9:16 ideal para TikTok, Reels e Shorts.</p>
            
            <div class="video-preview">
                <!-- Vídeo de exemplo simulado -->
                <video id="videoPlayer" controls>
                    <source src="https://assets.mixkit.co/videos/preview/mixkit-girl-in-neon-sign-city-43152-large.mp4" type="video/mp4">
                    Seu navegador não suporta vídeos.
                </video>
            </div>

            <button class="btn-download" onclick="baixarVideo()">Baixar Short (.MP4)</button>
        </div>
    </div>

    <script>
        function gerarShort() {
            const url = document.getElementById('youtubeUrl').value;
            if (!url) {
                alert('Por favor, insira um link válido do YouTube!');
                return;
            }

            // Esconde resultados anteriores e mostra o Loading
            document.getElementById('resultArea').style.display = 'none';
            document.getElementById('loadingArea').style.display = 'block';
            document.getElementById('btnGerar').disabled = true;

            // Simulação do tempo de processamento da IA e do Python (5 segundos)
            // Em um sistema real, aqui você usaria o "fetch()" para mandar o link para o seu servidor Python
            setTimeout(() => {
                document.getElementById('loadingText').innerText = "Cortando e convertendo para o formato vertical...";
                
                setTimeout(() => {
                    // Finaliza a simulação e mostra o vídeo gerado
                    document.getElementById('loadingArea').style.display = 'none';
                    document.getElementById('resultArea').style.display = 'block';
                    document.getElementById('btnGerar').disabled = false;
                    document.getElementById('videoPlayer').play();
                }, 2500);

            }, 2500);
        }

        function baixarVideo() {
            // Simulação do download
            alert('O download do seu vídeo cortado de 30 segundos começou!');
        }
    </script>
</body>
</html>
