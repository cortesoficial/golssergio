<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALEX PRO | Radar Analítico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; } /* Slate 900 */
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .pulse-alert { animation: pulseBorder 2s infinite; }
        @keyframes pulseBorder {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body class="text-slate-200 h-screen flex flex-col overflow-hidden">

    <header class="bg-[#0f172a] border-b border-slate-800 px-6 py-4 flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-emerald-500/10 rounded-lg flex items-center justify-center border border-emerald-500/20">
                <i data-lucide="crosshair" class="text-emerald-500"></i>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-widest text-slate-100">ALEX <span class="text-emerald-500">PRO</span></h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Radar Analítico Avançado</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="status-badge" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-800 border border-slate-700 text-xs font-bold text-slate-400">
                <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-500"></span>
                <span id="status-text">SISTEMA INATIVO</span>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-slate-500 uppercase font-bold">Próxima Varredura</p>
                <p id="countdown" class="text-lg font-mono font-bold text-emerald-500">00s</p>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-80 bg-[#1e293b] border-r border-slate-800 flex flex-col z-10 shrink-0">
            <div class="p-6 flex-1 overflow-y-auto custom-scrollbar">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider border-b border-slate-700 pb-2 mb-6">Parâmetros do Radar</h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-300 uppercase mb-2">Mercado Alvo</label>
                        <select id="cfg-market" class="w-full bg-[#0f172a] border border-slate-700 rounded-lg px-4 py-3 text-sm focus:border-emerald-500 outline-none transition-colors">
                            <option value="h2h">Match Odds (1X2)</option>
                            <option value="btts">Ambas Marcam</option>
                        </select>
                    </div>

                    <div>
                        <div class="flex justify-between items-end mb-2">
                            <label class="text-[11px] font-bold text-slate-300 uppercase">Confiança Mínima</label>
                            <span class="text-emerald-500 font-bold text-sm" id="lbl-prob">60%</span>
                        </div>
                        <input type="range" id="cfg-prob" min="40" max="90" value="60" class="w-full accent-emerald-500" oninput="document.getElementById('lbl-prob').innerText = this.value + '%'">
                        <p class="text-[10px] text-slate-500 mt-1">Probabilidade implícita exigida.</p>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-300 uppercase mb-2">Odd Min</label>
                            <input type="number" id="cfg-odd-min" value="1.50" step="0.05" class="w-full bg-[#0f172a] border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-center focus:border-emerald-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-300 uppercase mb-2">Odd Max</label>
                            <input type="number" id="cfg-odd-max" value="2.20" step="0.05" class="w-full bg-[#0f172a] border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-center focus:border-emerald-500 outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-slate-300 uppercase mb-2">Ciclo de Varredura (Seg)</label>
                        <select id="cfg-interval" class="w-full bg-[#0f172a] border border-slate-700 rounded-lg px-4 py-3 text-sm focus:border-emerald-500 outline-none">
                            <option value="30">Rápido (30s)</option>
                            <option value="60" selected>Padrão (60s)</option>
                            <option value="120">Lento (120s)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="p-6 border-t border-slate-800 bg-[#1e293b]">
                <button id="btn-toggle" onclick="toggleRadar()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                    <i data-lucide="power" class="w-5 h-5"></i>
                    <span id="btn-text">INICIAR RADAR</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 bg-slate-900 p-8 overflow-y-auto custom-scrollbar relative">
            <div class="max-w-5xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold text-slate-100 flex items-center gap-2">
                        <i data-lucide="activity" class="text-emerald-500"></i> Oportunidades Capturadas
                    </h2>
                    <button onclick="limparGrid()" class="text-xs text-slate-500 hover:text-slate-300 uppercase font-bold flex items-center gap-1">
                        <i data-lucide="trash-2" class="w-4 h-4"></i> Limpar Histórico
                    </button>
                </div>

                <div id="grid-alertas" class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    <div id="empty-state" class="col-span-full flex flex-col items-center justify-center py-32 text-slate-600">
                        <i data-lucide="radar" class="w-16 h-16 mb-4 opacity-50"></i>
                        <p class="font-medium text-sm">O radar está desligado. Configure os parâmetros e inicie o sistema.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        lucide.createIcons();

        // Variáveis de Controle
        let isRunning = false;
        let radarInterval;
        let countdownInterval;
        let secondsLeft = 0;
        const processedMatches = new Set(); // Evitar duplicatas no grid

        // Referências DOM
        const btnToggle = document.getElementById('btn-toggle');
        const btnText = document.getElementById('btn-text');
        const statusBadge = document.getElementById('status-badge');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const countdownDisplay = document.getElementById('countdown');
        const grid = document.getElementById('grid-alertas');
        const emptyState = document.getElementById('empty-state');
        const alertSound = document.getElementById('alert-sound');

        function toggleRadar() {
            isRunning = !isRunning;

            if (isRunning) {
                // Iniciar
                btnToggle.classList.replace('bg-emerald-600', 'bg-red-600');
                btnToggle.classList.replace('hover:bg-emerald-500', 'hover:bg-red-500');
                btnText.innerText = "PARAR RADAR";
                
                statusBadge.classList.replace('bg-slate-800', 'bg-emerald-500/10');
                statusBadge.classList.replace('border-slate-700', 'border-emerald-500/30');
                statusBadge.classList.replace('text-slate-400', 'text-emerald-400');
                statusDot.classList.replace('bg-slate-500', 'bg-emerald-500');
                statusDot.classList.add('animate-ping');
                statusText.innerText = "RADAR ATIVO";

                if (emptyState) emptyState.style.display = 'none';
                
                executarVarredura(); // Roda a primeira vez na hora
                iniciarTimer();
            } else {
                // Parar
                btnToggle.classList.replace('bg-red-600', 'bg-emerald-600');
                btnToggle.classList.replace('hover:bg-red-500', 'hover:bg-emerald-500');
                btnText.innerText = "INICIAR RADAR";
                
                statusBadge.classList.replace('bg-emerald-500/10', 'bg-slate-800');
                statusBadge.classList.replace('border-emerald-500/30', 'border-slate-700');
                statusBadge.classList.replace('text-emerald-400', 'text-slate-400');
                statusDot.classList.replace('bg-emerald-500', 'bg-slate-500');
                statusDot.classList.remove('animate-ping');
                statusText.innerText = "SISTEMA INATIVO";
                
                clearInterval(radarInterval);
                clearInterval(countdownInterval);
                countdownDisplay.innerText = "00s";
            }
        }

        function iniciarTimer() {
            const cicloSec = parseInt(document.getElementById('cfg-interval').value);
            secondsLeft = cicloSec;
            countdownDisplay.innerText = secondsLeft + "s";

            countdownInterval = setInterval(() => {
                secondsLeft--;
                countdownDisplay.innerText = secondsLeft + "s";
                
                if (secondsLeft <= 0) {
                    executarVarredura();
                    secondsLeft = cicloSec;
                }
            }, 1000);
        }

        async function executarVarredura() {
            const market = document.getElementById('cfg-market').value;
            const probMin = parseInt(document.getElementById('cfg-prob').value);
            const oddMin = parseFloat(document.getElementById('cfg-odd-min').value);
            const oddMax = parseFloat(document.getElementById('cfg-odd-max').value);
            
            try {
                const url = `https://corsproxy.io/?https://api.the-odds-api.com/v4/sports/soccer/odds/?apiKey=17ff5de216b7d5283de72a97f0ebb49c&regions=eu&markets=${market}&oddsFormat=decimal`;
                const res = await fetch(url);
                const jogos = await res.json();
                
                let foundNew = false;

                jogos.forEach(jogo => {
                    if (!jogo.bookmakers || !jogo.bookmakers[0]) return;
                    
                    const casaDesc = jogo.bookmakers[0].title;

                    jogo.bookmakers[0].markets[0].outcomes.forEach(o => {
                        const probImplicita = Math.round(100 / o.price);
                        
                        if (o.price >= oddMin && o.price <= oddMax && probImplicita >= probMin) {
                            const uniqueId = `${jogo.id}_${o.name}`;
                            
                            // Só adiciona se for uma oportunidade nova que ainda não está na tela
                            if (!processedMatches.has(uniqueId)) {
                                processedMatches.add(uniqueId);
                                renderizarCard(jogo, o, probImplicita, uniqueId, casaDesc);
                                foundNew = true;
                            }
                        }
                    });
                });

                if (foundNew) {
                    // Tocar som de alerta quando achar algo novo
                    alertSound.play().catch(e => console.log("Áudio bloqueado pelo navegador até haver interação."));
                }

            } catch (error) {
                console.error("Falha na varredura da API", error);
            }
        }

        function renderizarCard(jogo, o, prob, id, casa) {
            const timeHoraLocal = jogo.commence_time ? new Date(jogo.commence_time).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}) : '--:--';
            
            const card = document.createElement('div');
            card.id = id;
            card.className = "glass-panel p-5 rounded-2xl pulse-alert transition-all";
            
            card.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <span class="inline-block px-2 py-1 bg-slate-800 text-[9px] font-bold text-slate-400 rounded uppercase tracking-wider mb-2">
                            <i data-lucide="clock" class="inline w-3 h-3 text-emerald-500 mr-1"></i> ${timeHoraLocal}
                        </span>
                        <h3 class="font-bold text-sm text-slate-100 leading-tight">${jogo.home_team.split('(')[0]}<br><span class="text-slate-500 font-normal">vs</span> ${jogo.away_team.split('(')[0]}</h3>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Valor Justo</p>
                        <p class="text-2xl font-black text-emerald-500 leading-none">${o.price.toFixed(2)}</p>
                    </div>
                </div>
                
                <div class="bg-[#0f172a] p-3 rounded-lg border border-slate-800 flex justify-between items-center mb-3">
                    <div>
                        <p class="text-[10px] text-slate-500 uppercase font-bold">Alvo / Pick</p>
                        <p class="text-xs font-bold text-slate-200">${o.name}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-slate-500 uppercase font-bold">Casa de Aposta</p>
                        <p class="text-xs font-bold text-emerald-400">${casa}</p>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <div class="flex justify-between text-[10px] font-bold text-slate-400">
                        <span>CONFIDÊNCIA ESTATÍSTICA</span>
                        <span class="text-emerald-500">${prob}%</span>
                    </div>
                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-emerald-500 h-full rounded-full" style="width: ${prob}%"></div>
                    </div>
                </div>
            `;
            
            grid.prepend(card);
            lucide.createIcons();
            
            // Remove a animação de pulso após 5 segundos para não ficar piscando infinitamente
            setTimeout(() => {
                card.classList.remove('pulse-alert');
                card.classList.add('border-slate-700');
            }, 5000);
        }

        function limparGrid() {
            grid.innerHTML = '';
            processedMatches.clear();
            if (!isRunning) {
                grid.appendChild(emptyState);
                emptyState.style.display = 'flex';
            }
        }
    </script>
</body>
</html>
