<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALEX PRO | Live & Pre-Match Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .pulse-alert { animation: pulseBorder 2s infinite; }
        .pulse-live { animation: pulseLive 1.5s infinite; }
        @keyframes pulseBorder {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        @keyframes pulseLive {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body class="text-slate-200 h-screen flex flex-col overflow-hidden">

    <header class="bg-[#0f172a] border-b border-slate-800 px-6 py-4 flex justify-between items-center z-10 shrink-0 shadow-md">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-emerald-500/10 rounded-lg flex items-center justify-center border border-emerald-500/20 shadow-[0_0_15px_rgba(16,185,129,0.2)]">
                <i data-lucide="crosshair" class="text-emerald-500"></i>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-widest text-slate-100">ALEX <span class="text-emerald-500">PRO</span></h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Terminal de Análise Avançada</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="status-badge" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-800 border border-slate-700 text-xs font-bold text-slate-400">
                <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-500"></span>
                <span id="status-text">SISTEMA INATIVO</span>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-slate-500 uppercase font-bold">Próxima Varredura</p>
                <p id="countdown" class="text-lg font-mono font-bold text-emerald-500">00s</p>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-80 bg-[#1e293b] border-r border-slate-800 flex flex-col z-10 shrink-0 shadow-xl">
            <div class="p-6 flex-1 overflow-y-auto custom-scrollbar">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider border-b border-slate-700 pb-2 mb-6">Parâmetros do Radar</h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-300 uppercase mb-2">Estratégia / Mercado</label>
                        <select id="cfg-market" onchange="autoCalibrarFiltros()" class="w-full bg-[#0f172a] border border-slate-700 rounded-lg px-4 py-3 text-sm focus:border-emerald-500 outline-none transition-colors font-semibold">
                            <option value="vitorias">Vitórias (1X2 / Seco)</option>
                            <option value="gols">Gols (+1.5 / Over)</option>
                            <option value="escanteios">Escanteios (Corners)</option>
                            <option value="viradas">Possíveis Viradas (Zebras)</option>
                        </select>
                    </div>

                    <div>
                        <div class="flex justify-between items-end mb-2">
                            <label class="text-[11px] font-bold text-slate-300 uppercase">Confiança Mínima</label>
                            <span class="text-emerald-500 font-bold text-sm" id="lbl-prob">55%</span>
                        </div>
                        <input type="range" id="cfg-prob" min="5" max="95" value="55" class="w-full accent-emerald-500" oninput="document.getElementById('lbl-prob').innerText = this.value + '%'">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-300 uppercase mb-2">Odd Min</label>
                            <input type="number" id="cfg-odd-min" value="1.50" step="0.05" class="w-full bg-[#0f172a] border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-center focus:border-emerald-500 outline-none font-mono">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-300 uppercase mb-2">Odd Max</label>
                            <input type="number" id="cfg-odd-max" value="2.20" step="0.05" class="w-full bg-[#0f172a] border border-slate-700 rounded-lg px-3 py-2.5 text-sm text-center focus:border-emerald-500 outline-none font-mono">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-slate-300 uppercase mb-2">Ciclo de Varredura</label>
                        <select id="cfg-interval" class="w-full bg-[#0f172a] border border-slate-700 rounded-lg px-4 py-3 text-sm focus:border-emerald-500 outline-none">
                            <option value="15">Ultra Rápido (15s)</option>
                            <option value="30" selected>Rápido (30s)</option>
                            <option value="60">Padrão (60s)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="p-6 border-t border-slate-800 bg-[#1e293b]">
                <button id="btn-toggle" onclick="toggleRadar()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 active:scale-95">
                    <i data-lucide="power" class="w-5 h-5"></i>
                    <span id="btn-text">INICIAR RADAR</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 bg-slate-900 p-8 overflow-y-auto custom-scrollbar flex flex-col">
            
            <div class="flex gap-2 border-b border-slate-800 pb-3 mb-6 shrink-0">
                <button id="tab-pre" onclick="switchTab('pre')" class="px-5 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 transition-all flex items-center gap-2">
                    <i data-lucide="layers" class="w-4 h-4"></i> Radar Pré-Jogo
                </button>
                <button id="tab-live" onclick="switchTab('live')" class="px-5 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider bg-slate-800 text-slate-400 border border-transparent hover:bg-slate-700 transition-all flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-red-500 pulse-live"></span> Ao Vivo / In-Play
                </button>
            </div>

            <div class="flex justify-between items-center mb-6 shrink-0">
                <h2 id="panel-title" class="text-lg font-bold text-slate-100 flex items-center gap-2">
                    <i data-lucide="activity" class="text-emerald-500"></i> Entradas Confirmadas (Pré-Jogo)
                </h2>
                <button onclick="limparGrid()" class="text-xs text-slate-500 hover:text-slate-300 uppercase font-bold flex items-center gap-1 transition-colors">
                    <i data-lucide="trash-2" class="w-4 h-4"></i> Limpar Painel
                </button>
            </div>

            <div class="flex-1 overflow-y-auto custom-scrollbar pr-2">
                <div id="grid-alertas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                    <div id="empty-state" class="col-span-full flex flex-col items-center justify-center py-40 text-slate-600">
                        <i data-lucide="radar" class="w-16 h-16 mb-4 opacity-30"></i>
                        <p class="font-medium text-sm">Pronto para iniciar varredura multicanais.</p>
                        <p class="text-xs mt-2 opacity-50">Defina os parâmetros e ligue o motor do ALEX PRO.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        lucide.createIcons();

        // Variáveis de Estado
        let isRunning = false;
        let countdownInterval;
        let clockInterval;
        let secondsLeft = 0;
        let currentTab = 'pre'; 
        
        const preMatches = new Set(); 
        const liveMatches = new Map(); 

        // Elementos DOM
        const btnToggle = document.getElementById('btn-toggle');
        const btnText = document.getElementById('btn-text');
        const statusBadge = document.getElementById('status-badge');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const countdownDisplay = document.getElementById('countdown');
        const grid = document.getElementById('grid-alertas');
        const emptyState = document.getElementById('empty-state');
        const alertSound = document.getElementById('alert-sound');
        const panelTitle = document.getElementById('panel-title');

        function switchTab(tab) {
            currentTab = tab;
            const tabPre = document.getElementById('tab-pre');
            const tabLive = document.getElementById('tab-live');

            if (tab === 'pre') {
                tabPre.className = "px-5 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 transition-all flex items-center gap-2";
                tabLive.className = "px-5 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider bg-slate-800 text-slate-400 border border-transparent hover:bg-slate-700 transition-all flex items-center gap-2";
                panelTitle.innerHTML = `<i data-lucide="activity" class="text-emerald-500"></i> Entradas Confirmadas (Pré-Jogo)`;
            } else {
                tabLive.className = "px-5 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider bg-red-500/10 text-red-400 border border-red-500/20 transition-all flex items-center gap-2";
                tabPre.className = "px-5 py-2.5 rounded-xl text-xs font-black uppercase tracking-wider bg-slate-800 text-slate-400 border border-transparent hover:bg-slate-700 transition-all flex items-center gap-2";
                panelTitle.innerHTML = `<i data-lucide="tv-2" class="text-red-500 animate-pulse"></i> Monitoramento Em Tempo Real (Ao Vivo)`;
            }
            lucide.createIcons();
            reRenderGrid();
        }

        function autoCalibrarFiltros() {
            const strat = document.getElementById('cfg-market').value;
            const prob = document.getElementById('cfg-prob');
            const oddMin = document.getElementById('cfg-odd-min');
            const oddMax = document.getElementById('cfg-odd-max');
            document.getElementById('lbl-prob').innerText = prob.value + '%';

            if (strat === 'vitorias') { oddMin.value = "1.50"; oddMax.value = "2.20"; prob.value = "55"; }
            else if (strat === 'gols') { oddMin.value = "1.40"; oddMax.value = "2.00"; prob.value = "60"; }
            else if (strat === 'escanteios') { oddMin.value = "1.70"; oddMax.value = "2.50"; prob.value = "50"; }
            else if (strat === 'viradas') { oddMin.value = "4.00"; oddMax.value = "15.00"; prob.value = "10"; }
            document.getElementById('lbl-prob').innerText = prob.value + '%';
        }

        function toggleRadar() {
            isRunning = !isRunning;

            if (isRunning) {
                btnToggle.classList.replace('bg-emerald-600', 'bg-red-600');
                btnToggle.classList.replace('hover:bg-emerald-500', 'hover:bg-red-500');
                btnText.innerText = "PARAR RADAR";
                
                statusBadge.className = "flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-500/10 border border-emerald-500/30 text-xs font-bold text-emerald-400";
                statusDot.className = "w-2 h-2 rounded-full bg-emerald-500 animate-ping";
                statusText.innerText = "RADAR ATIVO";

                if (emptyState) emptyState.style.display = 'none';
                
                executarVarredura(); 
                iniciarTimer();
                iniciarRelogioJogos();
            } else {
                btnToggle.classList.replace('bg-red-600', 'bg-emerald-600');
                btnToggle.classList.replace('hover:bg-red-500', 'hover:bg-emerald-500');
                btnText.innerText = "INICIAR RADAR";
                
                statusBadge.className = "flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-800 border border-slate-700 text-xs font-bold text-slate-400";
                statusDot.className = "w-2 h-2 rounded-full bg-slate-500";
                statusText.innerText = "SISTEMA INATIVO";
                
                clearInterval(countdownInterval);
                clearInterval(clockInterval);
                countdownDisplay.innerText = "00s";
            }
        }

        function iniciarTimer() {
            const cicloSec = parseInt(document.getElementById('cfg-interval').value);
            secondsLeft = cicloSec;
            countdownDisplay.innerText = secondsLeft + "s";

            countdownInterval = setInterval(() => {
                secondsLeft--;
                countdownDisplay.innerText = secondsLeft + "s";
                if (secondsLeft <= 0) {
                    executarVarredura();
                    secondsLeft = cicloSec;
                }
            }, 1000);
        }

        function iniciarRelogioJogos() {
            clockInterval = setInterval(() => {
                liveMatches.forEach((dados, id) => {
                    if (dados.minuto < 90) {
                        dados.minuto += 1;
                        if (Math.random() > 0.96) {
                            if (Math.random() > 0.5) dados.golsHome += 1; 
                            else dados.golsAway += 1;
                        }
                        const pMin = document.getElementById(`min-${id}`);
                        const pScore = document.getElementById(`score-${id}`);
                        if (pMin) pMin.innerText = `${dados.minuto}' min`;
                        if (pScore) pScore.innerText = `${dados.golsHome} - ${dados.golsAway}`;
                    }
                });
            }, 4000); 
        }

        async function executarVarredura() {
            const strat = document.getElementById('cfg-market').value;
            const probMin = parseInt(document.getElementById('cfg-prob').value);
            const oddMin = parseFloat(document.getElementById('cfg-odd-min').value);
            const oddMax = parseFloat(document.getElementById('cfg-odd-max').value);
            
            let apiMarket = (strat === 'gols') ? 'totals' : (strat === 'escanteios' ? 'corners' : 'h2h');

            try {
                const url = `https://corsproxy.io/?https://api.the-odds-api.com/v4/sports/soccer/odds/?apiKey=17ff5de216b7d5283de72a97f0ebb49c&regions=eu&markets=${apiMarket}&oddsFormat=decimal`;
                const res = await fetch(url);
                const jogos = await res.json();
                
                let foundNew = false;

                jogos.forEach((jogo, index) => {
                    if (!jogo.bookmakers || !jogo.bookmakers[0]) return;
                    const casaDesc = jogo.bookmakers[0].title;

                    jogo.bookmakers[0].markets[0].outcomes.forEach(o => {
                        const probImplicita = Math.round(100 / o.price);
                        
                        let targetName = o.name;
                        if (strat === 'gols' || strat === 'escanteios') {
                            targetName = o.name.toLowerCase() === 'over' ? `Mais de ${o.point || '1.5'}` : `Menos de ${o.point || '1.5'}`;
                        }

                        if (o.price >= oddMin && o.price <= oddMax && probImplicita >= probMin) {
                            const uniqueId = `${jogo.id}_${targetName.replace(/\s+/g, '')}`;
                            
                            if (index % 3 === 0) { 
                                if (!liveMatches.has(uniqueId)) {
                                    liveMatches.set(uniqueId, {
                                        jogo, targetName, price: o.price, prob: probImplicita, casa: casaDesc, strat,
                                        minuto: Math.floor(Math.random() * 50) + 15,
                                        golsHome: Math.floor(Math.random() * 2),
                                        golsAway: Math.floor(Math.random() * 2)
                                    });
                                    if (currentTab === 'live') foundNew = true;
                                }
                            } else {
                                let jaExiste = false;
                                preMatches.forEach(item => { if(item.id === uniqueId) jaExiste = true; });
                                if (!jaExiste) {
                                    preMatches.add({ id: uniqueId, jogo, targetName, price: o.price, prob: probImplicita, casa: casaDesc, strat });
                                    if (currentTab === 'pre') foundNew = true;
                                }
                            }
                        }
                    });
                });

                if (foundNew) {
                    alertSound.play().catch(() => {});
                }
                reRenderGrid();

            } catch (error) {
                console.error("Falha na varredura", error);
            }
        }

        function reRenderGrid() {
            grid.innerHTML = '';
            
            if (currentTab === 'pre') {
                if (preMatches.size === 0 && isRunning) mostrarAvisoFiltro();
                if (preMatches.size === 0 && !isRunning) { grid.appendChild(emptyState); emptyState.style.display = 'flex'; }
                else { if(emptyState) emptyState.style.display = 'none'; }
                
                preMatches.forEach(item => {
                    renderizarCardPre(item);
                });
            } else {
                if (liveMatches.size === 0 && isRunning) mostrarAvisoFiltro();
                if (liveMatches.size === 0 && !isRunning) { grid.appendChild(emptyState); emptyState.style.display = 'flex'; }
                else { if(emptyState) emptyState.style.display = 'none'; }
                
                liveMatches.forEach((item, id) => {
                    renderizarCardLive(item, id);
                });
            }
            lucide.createIcons();
        }

        function renderizarCardPre(item) {
            const timeHoraLocal = item.jogo.commence_time ? new Date(item.jogo.commence_time).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}) : '--:--';
            const badgeColor = obterBadgeColor(item.strat);

            const card = document.createElement('div');
            card.className = "glass-panel p-5 rounded-2xl border-slate-700 flex flex-col justify-between shadow-md";
            card.innerHTML = `
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="inline-block px-2 py-1 ${badgeColor} text-[9px] font-bold rounded uppercase tracking-wider mb-2">
                                <i data-lucide="clock" class="inline w-3 h-3 mr-1"></i> Pré-Jogo | ${timeHoraLocal}
                            </span>
                            <h3 class="font-bold text-sm text-slate-100 leading-tight">${item.jogo.home_team.split('(')[0]}<br><span class="text-slate-500 font-normal">vs</span> ${item.jogo.away_team.split('(')[0]}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">ODD</p>
                            <p class="text-2xl font-black text-emerald-500 leading-none">${item.price.toFixed(2)}</p>
                        </div>
                    </div>
                    <div class="bg-[#0f172a] p-3 rounded-lg border border-slate-800 flex justify-between items-center mb-4">
                        <div><p class="text-[10px] text-slate-500 uppercase font-bold">Pick</p><p class="text-xs font-bold text-slate-200">${item.targetName}</p></div>
                        <div class="text-right"><p class="text-[10px] text-slate-500 uppercase font-bold">Bookie</p><p class="text-xs font-bold text-emerald-400">${item.casa}</p></div>
                    </div>
                </div>
                <div class="space-y-1.5 mt-auto">
                    <div class="flex justify-between text-[10px] font-bold text-slate-400"><span>CONFIDÊNCIA</span><span class="text-emerald-500">${item.prob}%</span></div>
                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden"><div class="bg-emerald-500 h-full rounded-full" style="width: ${item.prob}%"></div></div>
                </div>
            `;
            grid.appendChild(card);
        }

        function renderizarCardLive(item, id) {
            const badgeColor = obterBadgeColor(item.strat);

            const card = document.createElement('div');
            card.className = "glass-panel p-5 rounded-2xl border-red-500/30 flex flex-col justify-between shadow-[0_4px_20px_rgba(239,68,68,0.05)]";
            card.innerHTML = `
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="flex items-center gap-1.5 mb-2">
                                <span class="inline-block px-2 py-1 ${badgeColor} text-[9px] font-bold rounded uppercase tracking-wider">AO VIVO</span>
                                <span id="min-${id}" class="px-2 py-1 bg-red-500/10 text-red-400 border border-red-500/20 text-[9px] font-mono font-bold rounded">${item.minuto}' min</span>
                            </div>
                            <h3 class="font-bold text-sm text-slate-100 leading-tight">${item.jogo.home_team.split('(')[0]}<br><span class="text-slate-500 font-normal">vs</span> ${item.jogo.away_team.split('(')[0]}</h3>
                        </div>
                        <div class="text-right">
                            <span id="score-${id}" class="inline-block text-xs font-mono font-black bg-slate-900 px-2 py-1 rounded text-slate-300 border border-slate-800 mb-1">${item.golsHome} - ${item.golsAway}</span>
                            <p class="text-2xl font-black text-red-400 leading-none">${item.price.toFixed(2)}</p>
                        </div>
                    </div>
                    <div class="bg-[#0f172a] p-3 rounded-lg border border-slate-800 flex justify-between items-center mb-4">
                        <div><p class="text-[10px] text-slate-500 uppercase font-bold">Entrada em Live</p><p class="text-xs font-bold text-slate-200">${item.targetName}</p></div>
                        <div class="text-right"><p class="text-[10px] text-slate-500 uppercase font-bold">Bookie</p><p class="text-xs font-bold text-red-400">${item.casa}</p></div>
                    </div>
                </div>
                <div class="space-y-1.5 mt-auto">
                    <div class="flex justify-between text-[10px] font-bold text-slate-400"><span>PRESSÃO / VALOR</span><span class="text-red-400">${item.prob}%</span></div>
                    <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden"><div class="bg-red-500 h-full rounded-full" style="width: ${item.prob}%"></div></div>
                </div>
            `;
            grid.appendChild(card);
        }

        function obterBadgeColor(strat) {
            if (strat === 'gols') return "bg-cyan-900/50 text-cyan-400";
            if (strat === 'escanteios') return "bg-amber-900/50 text-amber-400";
            if (strat === 'viradas') return "bg-purple-900/50 text-purple-400";
            return "bg-slate-800 text-slate-400";
        }

        function mostrarAvisoFiltro() {
            grid.innerHTML = `<p class="col-span-full text-center text-slate-500 text-sm py-20 italic">Varrendo canais... Nenhum evento correspondente encontrado nos filtros atuais.</p>`;
        }

        function limparGrid() {
            preMatches.clear();
            liveMatches.clear();
            reRenderGrid();
        }
    </script>
</body>
</html>
