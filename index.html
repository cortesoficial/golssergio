<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ALEX | MODO VIGILANTE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pulse-green { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-[#05070a] text-white p-6">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black text-[#2ecc71]">ALEX <span class="text-slate-500">VIGILANTE</span></h1>
                <p id="status-text" class="text-xs text-slate-400">Status: Aguardando detecção de valor...</p>
            </div>
            <div id="timer" class="text-4xl font-mono font-bold text-[#2ecc71]">30</div>
        </div>

        <div id="alerts-container" class="space-y-4">
            </div>
    </div>

    <script>
        let contador = 30;

        async function monitorarMercado() {
            const container = document.getElementById('alerts-container');
            const status = document.getElementById('status-text');
            
            try {
                const res = await fetch('https://corsproxy.io/?https://api.the-odds-api.com/v4/sports/soccer/odds/?apiKey=17ff5de216b7d5283de72a97f0ebb49c&regions=eu&markets=h2h&oddsFormat=decimal');
                const jogos = await res.json();
                
                status.innerText = "Status: Escaneando oportunidades de valor...";
                
                jogos.forEach(jogo => {
                    jogo.bookmakers[0].markets[0].outcomes.forEach(o => {
                        const prob = Math.round(100 / o.price);
                        
                        // O "Momento Certo": O robô só alerta se a probabilidade for > 55% e odd entre 1.7 e 2.1
                        if (o.price >= 1.70 && o.price <= 2.10 && prob >= 55) {
                            adicionarAlerta(jogo, o, prob);
                        }
                    });
                });
            } catch (e) { status.innerText = "Erro ao conectar."; }
        }

        function adicionarAlerta(jogo, o, prob) {
            const container = document.getElementById('alerts-container');
            const id = jogo.id + o.name;
            if (document.getElementById(id)) return; // Evita duplicados

            const div = document.createElement('div');
            div.id = id;
            div.className = "pulse-green bg-[#161d24] p-6 rounded-2xl border-2 border-[#2ecc71] flex justify-between items-center";
            div.innerHTML = `
                <div>
                    <h2 class="font-bold">${jogo.home_team.split('(')[0]} vs ${jogo.away_team.split('(')[0]}</h2>
                    <p class="text-[#2ecc71] font-black text-xl">ODD ${o.price} | CONF: ${prob}%</p>
                </div>
                <button onclick="alert('Aposta Enviada para o seu Gerenciador!')" class="bg-[#2ecc71] text-black font-black px-6 py-3 rounded-lg hover:bg-white transition-all">
                    ENTRAR AGORA
                </button>
            `;
            container.prepend(div);
        }

        // Timer de monitoramento
        setInterval(() => {
            contador--;
            document.getElementById('timer').innerText = contador;
            if (contador <= 0) {
                monitorarMercado();
                contador = 30;
            }
        }, 1000);
    </script>
</body>
</html>
