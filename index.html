<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALEX PRO | AI Deep Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .ai-glow-premium { animation: pulsePremium 2s infinite; border: 1px solid rgba(147, 51, 234, 0.8) !important; }
        .pulse-live { animation: pulseLive 1.5s infinite; }
        @keyframes pulsePremium {
            0% { box-shadow: 0 0 0 0 rgba(147, 51, 234, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(147, 51, 234, 0); }
            100% { box-shadow: 0 0 0 0 rgba(147, 51, 234, 0); }
        }
        @keyframes pulseLive {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body class="text-slate-200 h-screen flex flex-col overflow-hidden relative">

    <div id="update-popup" class="hidden fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 transition-opacity duration-300 opacity-0">
        <div class="bg-slate-800 border-2 border-purple-500 rounded-2xl p-6 max-w-sm w-full shadow-[0_0_30px_rgba(147,51,234,0.4)] text-center transform scale-95 transition-transform duration-300">
            <div class="w-12 h-12 bg-purple-500/20 rounded-full flex items-center justify-center mx-auto mb-3.5 border border-purple-500/30">
                <i data-lucide="bell" class="text-purple-400 w-6 h-6 animate-bounce"></i>
            </div>
            <h4 class="text-base font-black tracking-wide text-slate-100 uppercase">Novos Sinais Betano</h4>
            <p id="popup-message" class="text-xs text-slate-300 mt-2 mb-5 leading-relaxed">O motor preditivo processou novas assimetrias matemáticas.</p>
            <button onclick="fecharPopup()" class="w-full bg-purple-600 hover:bg-purple-500 text-white text-xs font-black py-2.5 rounded-xl transition-all active:scale-95">
                CONFERIR OPÇÕES
            </button>
        </div>
    </div>

    <header class="bg-[#0f172a] border-b border-slate-800 px-4 md:px-6 py-3 md:py-4 flex justify-between items-center z-20 shrink-0 shadow-md">
        <div class="flex items-center gap-2.5">
            <div class="w-9 h-9 md:w-10 md:h-10 bg-purple-500/10 rounded-lg flex items-center justify-center border border-purple-500/20 shadow-[0_0_15px_rgba(147,51,234,0.3)]">
                <i data-lucide="cpu" class="text-purple-400 w-5 h-5 animate-spin" style="animation-duration: 3s;"></i>
            </div>
            <div>
                <h1 class="text-lg md:text-xl font-black tracking-widest text-slate-100">ALEX <span class="text-emerald-500">PRO</span></h1>
                <p class="text-[9px] md:text-[10px] text-purple-400 uppercase tracking-widest font-bold flex items-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-purple-500 animate-ping"></span> EXCLUSIVO BETANO ANALYTICS
                </p>
            </div>
        </div>
        <div class="flex items-center gap-3 md:gap-4">
            <div id="status-badge" class="flex items-center gap-1.5 px-2.5 py-1 md:py-1.5 rounded-full bg-slate-800 border border-slate-700 text-[10px] md:text-xs font-bold text-slate-400">
                <span id="status-dot" class="w-1.5 h-1.5 rounded-full bg-slate-500"></span>
                <span id="status-text" class="hidden sm:inline">SISTEMA INATIVO</span>
            </div>
            <div class="text-right">
                <p class="text-[9px] text-slate-500 uppercase font-bold">Varredura</p>
                <p id="countdown" class="text-sm md:text-lg font-mono font-bold text-purple-400">00s</p>
            </div>
        </div>
    </header>

    <div class="flex flex-1 flex-col md:flex-row overflow-hidden">
        <aside class="w-full md:w-80 bg-[#1e293b] border-b md:border-b-0 md:border-r border-slate-800 flex flex-col z-10 shrink-0 shadow-xl max-h-[75vh] md:max-h-full overflow-hidden">
            <button onclick="toggleFiltrosMobile()" class="flex md:hidden items-center justify-between px-4 py-3 bg-[#182232] border-b border-slate-800 w-full text-left">
                <div class="flex items-center gap-2 text-xs font-black text-slate-300 uppercase tracking-wider">
                    <i data-lucide="sliders-horizontal" class="w-4 h-4 text-purple-400"></i>
                    <span>Ajustar Filtros</span>
                </div>
            </button>
            <div id="filter-content" class="hidden md:block p-4 md:p-6 flex-1 overflow-y-auto custom-scrollbar space-y-6">
                <div>
                    <label class="block text-[11px] font-bold text-slate-300 uppercase mb-1.5">Estratégia</label>
                    <select id="cfg-market" class="w-full bg-[#0f172a] border border-slate-700 rounded-lg px-3 py-2.5 text-xs text-slate-200">
                        <option value="vitorias">Vitórias (1X2)</option>
                        <option value="gols">Gols</option>
                    </select>
                </div>
                <button id="btn-toggle" onclick="toggleRadar()" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-black py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 text-sm active:scale-95">
                    <i data-lucide="zap" class="w-4 h-4"></i>
                    <span id="btn-text">INICIAR MOTOR IA</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 bg-slate-900 p-4 md:p-8 overflow-y-auto custom-scrollbar">
            <div id="grid-alertas" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
                <div id="empty-state" class="col-span-full flex flex-col items-center justify-center py-20 text-slate-600">
                    <i data-lucide="fingerprint" class="w-12 h-12 mb-4 opacity-30 text-purple-400"></i>
                    <p class="text-sm">Aguardando ativação do motor.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        const API_KEY = '59ab96fa9795389a920737c329ab262b'; // Chave inserida
        let isRunning = false;
        
        // Elementos
        const grid = document.getElementById('grid-alertas');
        const emptyState = document.getElementById('empty-state');
        const btnToggle = document.getElementById('btn-toggle');
        const btnText = document.getElementById('btn-text');

        function toggleRadar() {
            isRunning = !isRunning;
            if(isRunning) {
                btnText.innerText = "DESLIGAR MOTOR";
                btnToggle.classList.replace('bg-purple-600', 'bg-red-600');
                executarVarredura();
            } else {
                btnText.innerText = "INICIAR MOTOR IA";
                btnToggle.classList.replace('bg-red-600', 'bg-purple-600');
                grid.innerHTML = '<div id="empty-state" class="col-span-full flex flex-col items-center justify-center py-20 text-slate-600"><p class="text-sm">Sistema parado.</p></div>';
            }
        }

        async function executarVarredura() {
            grid.innerHTML = '<p class="text-slate-400 text-sm">Conectando à API de dados...</p>';
            
            const options = {
                method: 'GET',
                headers: {
                    'x-rapidapi-key': API_KEY,
                    'x-rapidapi-host': 'api-football-v1.p.rapidapi.com'
                }
            };

            try {
                // Buscando jogos do dia 30/05/2026
                const response = await fetch('https://api-football-v1.p.rapidapi.com/v3/fixtures?date=2026-05-30', options);
                const data = await response.json();

                if (data.response && data.response.length > 0) {
                    grid.innerHTML = '';
                    data.response.slice(0, 6).forEach(match => {
                        const card = document.createElement('div');
                        card.className = "glass-panel p-4 rounded-xl border border-slate-700";
                        card.innerHTML = `
                            <h3 class="font-bold text-slate-100">${match.teams.home.name} vs ${match.teams.away.name}</h3>
                            <p class="text-xs text-purple-400 mb-4">${match.league.name}</p>
                            <a href="https://br.betano.com/sport/futebol/" target="_blank" class="block w-full text-center bg-purple-600 text-white text-xs font-black py-2 rounded-lg">APOSTAR</a>
                        `;
                        grid.appendChild(card);
                    });
                } else {
                    grid.innerHTML = '<p class="text-red-400">Nenhum jogo encontrado ou limite da API atingido.</p>';
                }
            } catch (err) {
                grid.innerHTML = '<p class="text-red-400">Erro de conexão. Verifique a API Key.</p>';
            }
        }

        function fecharPopup() { document.getElementById('update-popup').classList.add('hidden'); }
        function toggleFiltrosMobile() { document.getElementById('filter-content').classList.toggle('hidden'); }
    </script>
</body>
</html>
