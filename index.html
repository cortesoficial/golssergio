<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALEX PRO | AI Deep Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .ai-glow-premium { animation: pulsePremium 2s infinite; border: 1px solid rgba(147, 51, 234, 0.8) !important; }
        .pulse-live { animation: pulseLive 1.5s infinite; }
        @keyframes pulsePremium {
            0% { box-shadow: 0 0 0 0 rgba(147, 51, 234, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(147, 51, 234, 0); }
            100% { box-shadow: 0 0 0 0 rgba(147, 51, 234, 0); }
        }
        @keyframes pulseLive {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body class="text-slate-200 h-screen flex flex-col overflow-hidden relative">

    <div id="update-popup" class="hidden fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 transition-opacity duration-300 opacity-0">
        <div class="bg-slate-800 border-2 border-purple-500 rounded-2xl p-6 max-w-sm w-full shadow-[0_0_30px_rgba(147,51,234,0.4)] text-center transform scale-95 transition-transform duration-300">
            <div class="w-12 h-12 bg-purple-500/20 rounded-full flex items-center justify-center mx-auto mb-3.5 border border-purple-500/30">
                <i data-lucide="bell" class="text-purple-400 w-6 h-6 animate-bounce"></i>
            </div>
            <h4 class="text-base font-black tracking-wide text-slate-100 uppercase">Novos Sinais Betano</h4>
            <p id="popup-message" class="text-xs text-slate-300 mt-2 mb-5 leading-relaxed">O motor preditivo processou novas assimetrias.</p>
            <button onclick="fecharPopup()" class="w-full bg-purple-600 hover:bg-purple-500 text-white text-xs font-black py-2.5 rounded-xl transition-all active:scale-95">CONFERIR</button>
        </div>
    </div>

    <header class="bg-[#0f172a] border-b border-slate-800 px-4 md:px-6 py-3 flex justify-between items-center z-20 shrink-0">
        <div class="flex items-center gap-2.5">
            <div class="w-9 h-9 bg-purple-500/10 rounded-lg flex items-center justify-center border border-purple-500/20">
                <i data-lucide="cpu" class="text-purple-400 w-5 h-5 animate-spin" style="animation-duration: 3s;"></i>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-widest text-slate-100">ALEX <span class="text-emerald-500">PRO</span></h1>
            </div>
        </div>
        <div class="text-right">
            <p id="countdown" class="text-lg font-mono font-bold text-purple-400">00s</p>
        </div>
    </header>

    <div class="flex flex-1 flex-col md:flex-row overflow-hidden">
        
        <aside class="w-full md:w-80 bg-[#1e293b] border-b md:border-r border-slate-800 flex flex-col z-10 shrink-0 p-4">
            <button id="btn-toggle" onclick="toggleRadar()" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-black py-3 rounded-xl transition-all flex items-center justify-center gap-2 text-sm active:scale-95">
                <i data-lucide="zap" class="w-4 h-4"></i>
                <span id="btn-text">INICIAR MOTOR IA</span>
            </button>
        </aside>

        <main class="flex-1 bg-slate-900 p-4 md:p-8 overflow-y-auto custom-scrollbar flex flex-col">
            
            <div id="status-banner" class="bg-amber-500/10 border border-amber-500/30 text-amber-500 px-4 py-3 rounded-xl mb-6 flex items-center justify-center gap-2 font-bold text-xs uppercase tracking-widest shadow-lg animate-pulse">
                <i data-lucide="alert-triangle" class="w-4 h-4"></i>
                <span>Sistema Inativo por enquanto</span>
            </div>

            <div class="flex gap-2 border-b border-slate-800 pb-3 mb-6 shrink-0 w-full">
                <button id="tab-pre" onclick="switchTab('pre')" class="flex-1 text-center py-2.5 rounded-xl text-xs font-black uppercase bg-purple-500/10 text-purple-400 border border-purple-500/20">Pré-Jogo</button>
                <button id="tab-live" onclick="switchTab('live')" class="flex-1 text-center py-2.5 rounded-xl text-xs font-black uppercase bg-slate-800 text-slate-400 border border-transparent">Ao Vivo</button>
            </div>

            <div id="grid-alertas" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
                <div id="empty-state" class="col-span-full flex flex-col items-center justify-center py-20 text-slate-600">
                    <i data-lucide="fingerprint" class="w-12 h-12 mb-4 opacity-30 text-purple-400"></i>
                    <p class="text-xs">Aguardando ativação do motor.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        let isRunning = false;
        
        // Elementos UI
        const btnToggle = document.getElementById('btn-toggle');
        const btnText = document.getElementById('btn-text');
        const statusBanner = document.getElementById('status-banner');

        function toggleRadar() {
            isRunning = !isRunning;

            if (isRunning) {
                // Estado ATIVO
                btnToggle.classList.replace('bg-purple-600', 'bg-red-600');
                btnText.innerText = "DESLIGAR MOTOR";
                statusBanner.classList.add('hidden'); // Oculta a faixa
                
                // Inicia lógica aqui...
                executarVarredura();
            } else {
                // Estado INATIVO
                btnToggle.classList.replace('bg-red-600', 'bg-purple-600');
                btnText.innerText = "INICIAR MOTOR IA";
                statusBanner.classList.remove('hidden'); // Mostra a faixa
                
                // Para lógica aqui...
                limparGrid();
            }
        }

        function executarVarredura() {
            // Lógica de varredura (exemplo mantido)
            console.log("Varredura iniciada...");
        }

        function limparGrid() {
            console.log("Sistema parado.");
        }

        function switchTab(tab) {
            // Lógica de abas
        }
    </script>
</body>
</html>
